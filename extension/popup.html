<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Assistente Zweb - Controle</title>
  <style>
    :root{
      --bg:#edf3f8;
      --panel:#ffffff;
      --panel-alt:#f5f8fb;
      --text:#16202a;
      --muted:#5d6b79;
      --line:#d6e0ea;
      --accent:#1664c0;
      --accent-strong:#0f4c92;
      --shadow:0 18px 40px rgba(12, 31, 51, 0.16);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-width:360px;
      max-width:360px;
      min-height:420px;
      font-family:"Segoe UI",Tahoma,Geneva,Verdana,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top right, rgba(22,100,192,0.18), transparent 42%),
        linear-gradient(180deg, #f6fbff 0%, var(--bg) 100%);
      padding:16px;
    }
    .shell{
      background:rgba(255,255,255,0.94);
      border:1px solid rgba(214,224,234,0.95);
      border-radius:22px;
      box-shadow:var(--shadow);
      overflow:hidden;
      backdrop-filter:blur(8px);
    }
    .hero{
      padding:18px 18px 14px;
      background:
        linear-gradient(135deg, rgba(22,100,192,0.14), rgba(255,255,255,0) 60%),
        linear-gradient(180deg, #ffffff 0%, #f7fbff 100%);
      border-bottom:1px solid var(--line);
    }
    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:6px;
      font-size:11px;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:var(--accent-strong);
      background:rgba(22,100,192,0.1);
      border:1px solid rgba(22,100,192,0.15);
      border-radius:999px;
      padding:5px 9px;
      margin-bottom:10px;
    }
    h1{
      margin:0;
      font-size:20px;
      line-height:1.15;
    }
    .subtitle{
      margin:8px 0 0;
      color:var(--muted);
      font-size:13px;
      line-height:1.45;
    }
    .feature-groups{
      padding:14px 12px 0;
      display:grid;
      gap:14px;
    }
    .group-title{
      margin:0 0 8px;
      padding:0 6px;
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.08em;
      color:var(--muted);
    }
    .feature-list{
      display:grid;
      gap:10px;
    }
    .feature-card{
      display:grid;
      grid-template-columns:1fr auto;
      gap:12px;
      align-items:start;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px 14px 13px;
      box-shadow:0 8px 18px rgba(15,76,146,0.06);
    }
    .feature-title{
      margin:0;
      font-size:14px;
      font-weight:700;
      line-height:1.2;
    }
    .feature-description{
      margin:6px 0 0;
      color:var(--muted);
      font-size:12px;
      line-height:1.45;
    }
    .feature-meta{
      margin-top:9px;
      display:flex;
      flex-wrap:wrap;
      gap:6px;
    }
    .badge{
      display:inline-flex;
      align-items:center;
      min-height:22px;
      padding:0 9px;
      border-radius:999px;
      border:1px solid var(--line);
      background:var(--panel-alt);
      color:var(--muted);
      font-size:11px;
      font-weight:600;
    }
    .badge-reload{
      color:var(--accent-strong);
      border-color:rgba(22,100,192,0.18);
      background:rgba(22,100,192,0.08);
    }
    .switch{
      position:relative;
      display:inline-flex;
      width:52px;
      height:31px;
      flex:0 0 auto;
    }
    .switch input{
      position:absolute;
      opacity:0;
      pointer-events:none;
    }
    .slider{
      width:100%;
      height:100%;
      border-radius:999px;
      background:#bcc9d7;
      border:1px solid rgba(90,110,130,0.16);
      transition:background .18s ease, border-color .18s ease;
      cursor:pointer;
      position:relative;
    }
    .slider::after{
      content:"";
      position:absolute;
      top:3px;
      left:3px;
      width:23px;
      height:23px;
      border-radius:50%;
      background:#ffffff;
      box-shadow:0 4px 10px rgba(12,31,51,0.2);
      transition:transform .18s ease;
    }
    .switch input:checked + .slider{
      background:linear-gradient(135deg, var(--accent) 0%, #2196f3 100%);
      border-color:rgba(22,100,192,0.35);
    }
    .switch input:checked + .slider::after{
      transform:translateX(21px);
    }
    .switch input:focus-visible + .slider{
      outline:2px solid rgba(22,100,192,0.28);
      outline-offset:2px;
    }
    .footer{
      padding:16px 18px 18px;
    }
    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .primary-btn{
      appearance:none;
      border:0;
      flex:1 1 0;
      border-radius:14px;
      padding:12px 14px;
      font-size:13px;
      font-weight:700;
      color:#ffffff;
      background:linear-gradient(135deg, var(--accent-strong) 0%, var(--accent) 100%);
      box-shadow:0 12px 20px rgba(22,100,192,0.24);
      cursor:pointer;
    }
    .primary-btn:hover{filter:brightness(1.03)}
    .primary-btn:active{transform:translateY(1px)}
    .secondary-btn{
      appearance:none;
      flex:1 1 0;
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px 14px;
      font-size:13px;
      font-weight:700;
      color:var(--accent-strong);
      background:var(--panel);
      cursor:pointer;
      box-shadow:0 10px 18px rgba(12,31,51,0.08);
    }
    .secondary-btn:hover{background:#f7fbff}
    .secondary-btn:active{transform:translateY(1px)}
  </style>
</head>
<body>
  <div class="shell">
    <div class="hero">
      <div class="eyebrow">Controle da extens&atilde;o</div>
      <h1>Assistente Zweb</h1>
      <p class="subtitle">Bloqueios e automa&ccedil;&otilde;es podem ser ligados ou desligados separadamente.</p>
    </div>

    <div class="feature-groups" id="featureGroups"></div>

    <div class="footer">
      <div class="actions">
        <button class="primary-btn" id="reload">Recarregar pagina ativa</button>
        <button class="secondary-btn" id="openLogs">Abrir logs</button>
      </div>
    </div>
  </div>

  <script src="features.js"></script>
  <script src="popup.js"></script>
</body>
</html>
